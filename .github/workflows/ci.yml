name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

env:
  NODE_VERSION: '20'

jobs:
  lint-and-type-check:
    name: Lint and Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript type check
        run: npx tsc --noEmit

      - name: Run ESLint
        run: npm run lint -- --max-warnings 0
        continue-on-error: true

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: lint-and-type-check

    strategy:
      matrix:
        node-version: ['20']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build
        env:
          NEXT_PUBLIC_SANITY_PROJECT_ID: ${{ secrets.SANITY_PROJECT_ID || 'test-project-id' }}
          NEXT_PUBLIC_SANITY_DATASET: 'production'
          NEXT_PUBLIC_SANITY_API_VERSION: '2026-03-01'
          SANITY_API_TOKEN: ${{ secrets.SANITY_API_TOKEN || 'test-token' }}
          NEXT_PUBLIC_SITE_URL: 'https://trada.io'
          NEXT_PUBLIC_APP_URL: 'https://app.trada.io'

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts-node-${{ matrix.node-version }}
          path: .next
          retention-days: 1
          if-no-files-found: ignore

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=moderate
        continue-on-error: true

  performance:
    name: Performance Check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check bundle size
        run: |
          npm run build
          echo "Build completed successfully"

  all-checks-passed:
    name: All Checks Passed
    runs-on: ubuntu-latest
    needs: [lint-and-type-check, build, security-audit, performance]
    if: always()

    steps:
      - name: Check job statuses
        run: |
          if [[ "${{ needs.lint-and-type-check.result }}" == "failure" || \
                "${{ needs.build.result }}" == "failure" || \
                "${{ needs.security-audit.result }}" == "failure" || \
                "${{ needs.performance.result }}" == "failure" ]]; then
            echo "❌ One or more jobs failed"
            exit 1
          fi
          echo "✓ All checks passed!"
          exit 0

  notify:
    name: Notify Results
    runs-on: ubuntu-latest
    needs: [all-checks-passed]
    if: always()

    steps:
      - name: Check final status
        run: |
          if [[ "${{ needs.all-checks-passed.result }}" == "success" ]]; then
            echo "✓ CI pipeline completed successfully"
          else
            echo "✗ CI pipeline failed"
            exit 1
          fi
